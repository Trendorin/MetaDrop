name: Bug report
description: Report a reproducible correctness, interface, or packaging defect
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Do not upload a private file or disclose a vulnerability here. Use SECURITY.md for security reports and create synthetic metadata samples.
  - type: input
    id: version
    attributes:
      label: MetaDrop version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Linux system
      description: Distribution, desktop, display server, and installation method.
      placeholder: Fedora 44, KDE Plasma, Wayland, AppImage
    validations:
      required: true
  - type: dropdown
    id: family
    attributes:
      label: File family
      options:
        - Image
        - Audio or MP4
        - PDF
        - Office or OpenDocument
        - Interface or tray
        - Packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: List the smallest sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Expected and observed result
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed personal data, paths, secrets, and private files from this report.
          required: true
