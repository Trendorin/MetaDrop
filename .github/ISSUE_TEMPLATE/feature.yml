name: Feature proposal
description: Propose a focused, verifiable improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real workflow is currently difficult or unsafe?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior, not only a visual treatment.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification boundary
      description: If this adds a format or cleaner, how can MetaDrop prove the result?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require telemetry, accounts, cloud processing, or overwriting source files.
          required: true
