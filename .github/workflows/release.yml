name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package:
    name: Build release artifacts
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential cmake curl file ninja-build patchelf rpm \
            qt6-base-dev qt6-svg-dev qt6-tools-dev \
            libarchive-dev libexiv2-dev libqpdf-dev libtag1-dev

      - name: Resolve version
        id: version
        shell: bash
        run: |
          project_version="$(awk '$1 == "VERSION" { print $2; exit }' CMakeLists.txt)"
          if [[ -z "${project_version}" ]]; then
            echo "Could not resolve the project version" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "${version}" != "${project_version}" ]]; then
              echo "Tag version ${version} does not match project version ${project_version}" >&2
              exit 1
            fi
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            version="${project_version}"
          else
            version="${project_version}-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMETADROP_BUILD_TESTS=ON

      - name: Build and test
        run: |
          cmake --build build --parallel 2
          ctest --test-dir build --output-on-failure

      - name: Build native packages
        run: |
          mkdir -p dist package-output
          cpack --config build/CPackConfig.cmake -G DEB -B package-output
          cpack --config build/CPackConfig.cmake -G RPM -B package-output
          cp package-output/*.deb package-output/*.rpm dist/

      - name: Assemble AppDir
        run: |
          DESTDIR="$PWD/AppDir" cmake --install build --prefix /usr
          mv AppDir/usr/share/metainfo/io.github.trendorin.MetaDrop.metainfo.xml \
            AppDir/usr/share/metainfo/io.github.trendorin.MetaDrop.appdata.xml

      - name: Build AppImage
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          curl --fail --location --silent --show-error \
            --output linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl --fail --location --silent --show-error \
            --output linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export PATH="$PWD:$PATH"
          export QMAKE=/usr/bin/qmake6
          export LINUXDEPLOY_OUTPUT_VERSION="${RELEASE_VERSION}"
          export LDAI_OUTPUT="MetaDrop-${RELEASE_VERSION}-x86_64.AppImage"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file packaging/io.github.trendorin.MetaDrop.desktop \
            --icon-file resources/icons/io.github.trendorin.MetaDrop.png \
            --plugin qt \
            --output appimage
          mv "$LDAI_OUTPUT" dist/

      - name: Create source archive and checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git archive --format=tar.gz \
            --prefix="MetaDrop-${VERSION}/" \
            --output="dist/MetaDrop-${VERSION}-source.tar.gz" HEAD
          source_hash="$(sha256sum "dist/MetaDrop-${VERSION}-source.tar.gz" | cut -d' ' -f1)"
          sed -e "s/@VERSION@/${VERSION}/g" -e "s/@SOURCE_SHA256@/${source_hash}/g" \
            packaging/arch/PKGBUILD.in > dist/PKGBUILD
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' \
            | sort --zero-terminated \
            | xargs --null --no-run-if-empty sha256sum > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MetaDrop-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: >-
          github.ref_type == 'tag' ||
          (github.ref_name == 'main' && startsWith(github.event.head_commit.message, 'release:'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          target_commitish: ${{ github.sha }}
          name: MetaDrop ${{ steps.version.outputs.version }}
          body_path: docs/release-notes-${{ steps.version.outputs.version }}.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: dist/*
