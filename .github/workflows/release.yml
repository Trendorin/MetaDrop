name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release version
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          project_version="$(awk '$1 == "VERSION" { print $2; exit }' CMakeLists.txt)"
          if [[ -z "${project_version}" ]]; then
            echo "Could not resolve the project version" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "${version}" != "${project_version}" ]]; then
              echo "Tag version ${version} does not match project version ${project_version}" >&2
              exit 1
            fi
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            version="${project_version}"
          else
            version="${project_version}-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  portable:
    name: Build and install DEB on Ubuntu 24.04
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-svg-dev qt6-tools-dev \
            libarchive-dev libexiv2-dev libqpdf-dev libtag1-dev

      - name: Configure, build and test
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DMETADROP_BUILD_TESTS=ON
          cmake --build build --parallel 2
          ctest --test-dir build --output-on-failure

      - name: Build DEB and install tree
        run: |
          mkdir -p dist package-output
          cpack --config build/CPackConfig.cmake -G DEB -B package-output
          cpack --config build/CPackConfig.cmake -G TGZ -B package-output
          cp package-output/*.deb package-output/*.tar.gz dist/

      - name: Verify DEB dependencies and installation
        run: |
          deb_file="$(find dist -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "${deb_file}"
          deb_file="$(realpath "${deb_file}")"
          dpkg-deb --info "${deb_file}"
          dpkg-deb --contents "${deb_file}"
          if dpkg-deb --field "${deb_file}" Depends | grep -Eq '(^|, )[[:alnum:].+-]+-dev([ ,]|$)'; then
            echo "DEB unexpectedly depends on a development package" >&2
            exit 1
          fi
          sudo apt-get install --no-install-recommends -y "${deb_file}"
          dpkg-query --show --showformat='${Package} ${Version}\n' metadrop
          dpkg --verify metadrop
          ldd /usr/bin/metadrop | tee /tmp/metadrop-deb-ldd.txt
          ! grep -q 'not found' /tmp/metadrop-deb-ldd.txt

      - name: Verify install tree
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          tree_file="dist/MetaDrop-${VERSION}-x86_64.tar.gz"
          test -f "${tree_file}"
          tar -tzf "${tree_file}" | tee /tmp/metadrop-tree.txt
          grep -Eq '(^|/)bin/metadrop$' /tmp/metadrop-tree.txt
          if grep -Eq '(^/|(^|/)\.\.(/|$))' /tmp/metadrop-tree.txt; then
            echo "Install tree contains an unsafe path" >&2
            exit 1
          fi

      - name: Create source, PKGBUILD and SPDX artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git archive --format=tar.gz \
            --prefix="MetaDrop-${VERSION}/" \
            --output="dist/MetaDrop-${VERSION}-source.tar.gz" HEAD
          source_hash="$(sha256sum "dist/MetaDrop-${VERSION}-source.tar.gz" | cut -d' ' -f1)"
          sed -e "s/@VERSION@/${VERSION}/g" -e "s/@SOURCE_SHA256@/${source_hash}/g" \
            packaging/arch/PKGBUILD.in > dist/PKGBUILD
          packaging/scripts/generate-sbom.sh "$VERSION" > "dist/MetaDrop-${VERSION}.spdx"
          grep -Fq "sha256sums=('${source_hash}')" dist/PKGBUILD

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MetaDrop-portable-${{ needs.prepare.outputs.version }}
          path: dist/*
          if-no-files-found: error

  rpm:
    name: Build and install RPM on Fedora 44
    needs: prepare
    runs-on: ubuntu-24.04
    container: fedora:44
    timeout-minutes: 35

    steps:
      - name: Install Fedora build dependencies
        run: |
          dnf install --setopt=install_weak_deps=False -y \
            cmake gcc-c++ git-core ninja-build pkgconf-pkg-config rpm-build \
            qt6-qtbase-devel qt6-qtsvg-devel qt6-qttools-devel \
            exiv2-devel taglib-devel qpdf-devel libarchive-devel

      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure, build and test
        run: |
          cmake -S . -B build-rpm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DMETADROP_BUILD_TESTS=ON
          cmake --build build-rpm --parallel 2
          ctest --test-dir build-rpm --output-on-failure

      - name: Build Fedora RPM
        run: |
          mkdir -p dist package-output
          cpack --config build-rpm/CPackConfig.cmake -G RPM -B package-output
          cp package-output/*.rpm dist/

      - name: Verify Fedora dependencies and installation
        run: |
          rpm_file="$(find dist -maxdepth 1 -type f -name '*.rpm' -print -quit)"
          test -n "${rpm_file}"
          rpm -qpl "${rpm_file}"
          rpm -qpR "${rpm_file}" | sort | tee /tmp/metadrop-rpm-requires.txt
          if grep -Eq 'libexiv2\.so\.27|libqpdf\.so\.29' /tmp/metadrop-rpm-requires.txt; then
            echo "RPM contains dependencies from the Ubuntu build environment" >&2
            exit 1
          fi
          grep -q 'libexiv2\.so\.28' /tmp/metadrop-rpm-requires.txt
          grep -q 'libqpdf\.so\.30' /tmp/metadrop-rpm-requires.txt
          dnf install --setopt=install_weak_deps=False -y "${rpm_file}"
          rpm -q metadrop
          rpm -V metadrop
          ldd /usr/bin/metadrop | tee /tmp/metadrop-rpm-ldd.txt
          ! grep -q 'not found' /tmp/metadrop-rpm-ldd.txt

      - name: Upload Fedora RPM
        uses: actions/upload-artifact@v7
        with:
          name: MetaDrop-rpm-${{ needs.prepare.outputs.version }}
          path: dist/*.rpm
          if-no-files-found: error

  arch:
    name: Build and install package on Arch Linux
    needs: [prepare, portable]
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    timeout-minutes: 40

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            cmake git ninja qt6-base qt6-svg qt6-tools \
            exiv2 taglib qpdf libarchive

      - name: Download source and PKGBUILD
        uses: actions/download-artifact@v8
        with:
          name: MetaDrop-portable-${{ needs.prepare.outputs.version }}
          path: dist-portable

      - name: Build package as an unprivileged user
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          install -d -m 0755 /tmp/metadrop-package dist
          cp dist-portable/PKGBUILD \
            "dist-portable/MetaDrop-${VERSION}-source.tar.gz" \
            /tmp/metadrop-package/
          useradd --create-home builder
          chown -R builder:builder /tmp/metadrop-package
          runuser -u builder -- bash -lc \
            'cd /tmp/metadrop-package && LC_ALL=C makepkg --cleanbuild --noconfirm'
          cp "/tmp/metadrop-package/metadrop-${VERSION}-1-x86_64.pkg.tar.zst" dist/

      - name: Verify and install Arch package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          package_file="dist/metadrop-${VERSION}-1-x86_64.pkg.tar.zst"
          test -f "${package_file}"
          pacman -Qip "${package_file}"
          pacman -Qlp "${package_file}" | tee /tmp/metadrop-arch-files.txt
          grep -q 'usr/bin/metadrop$' /tmp/metadrop-arch-files.txt
          pacman -U --noconfirm "${package_file}"
          pacman -Q metadrop
          pacman -Qkk metadrop
          ldd /usr/bin/metadrop | tee /tmp/metadrop-arch-ldd.txt
          ! grep -q 'not found' /tmp/metadrop-arch-ldd.txt

      - name: Upload Arch package
        uses: actions/upload-artifact@v7
        with:
          name: MetaDrop-arch-${{ needs.prepare.outputs.version }}
          path: dist/*.pkg.tar.zst
          if-no-files-found: error

  publish:
    name: Verify and publish release
    needs: [prepare, portable, rpm, arch]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download portable artifacts
        uses: actions/download-artifact@v8
        with:
          name: MetaDrop-portable-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Download Fedora RPM
        uses: actions/download-artifact@v8
        with:
          name: MetaDrop-rpm-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Download Arch package
        uses: actions/download-artifact@v8
        with:
          name: MetaDrop-arch-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Verify artifact set and create checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          shopt -s nullglob
          deb=(dist/metadrop_"${VERSION}"_*.deb)
          rpm=(dist/metadrop-"${VERSION}"-*.x86_64.rpm)
          arch=(dist/metadrop-"${VERSION}"-1-x86_64.pkg.tar.zst)
          tree=(dist/MetaDrop-"${VERSION}"-x86_64.tar.gz)
          source=(dist/MetaDrop-"${VERSION}"-source.tar.gz)
          spdx=(dist/MetaDrop-"${VERSION}".spdx)
          pkgbuild=(dist/PKGBUILD)
          test "${#deb[@]}" -eq 1
          test "${#rpm[@]}" -eq 1
          test "${#arch[@]}" -eq 1
          test "${#tree[@]}" -eq 1
          test "${#source[@]}" -eq 1
          test "${#spdx[@]}" -eq 1
          test "${#pkgbuild[@]}" -eq 1
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 7
          if find dist -maxdepth 1 -type f -iname '*AppImage*' | grep -q .; then
            echo "Unexpected AppImage artifact" >&2
            exit 1
          fi
          if tar -tzf "${source[0]}" | grep -Eq '(^|/)(CODE_OF_CONDUCT[^/]*|\.env[^/]*|id_rsa|id_ed25519|[^/]*AppImage[^/]*)$'; then
            echo "Source archive contains a forbidden file" >&2
            exit 1
          fi
          source_hash="$(sha256sum "${source[0]}" | cut -d' ' -f1)"
          grep -Fq "sha256sums=('${source_hash}')" "${pkgbuild[0]}"
          grep -Fq "PackageVersion: ${VERSION}" "${spdx[0]}"
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' \
            | sort --zero-terminated \
            | xargs --null --no-run-if-empty sha256sum > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload verified release set
        uses: actions/upload-artifact@v7
        with:
          name: MetaDrop-${{ needs.prepare.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: >-
          github.ref_type == 'tag' ||
          (github.ref_name == 'main' && startsWith(github.event.head_commit.message, 'release:'))
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.prepare.outputs.version) }}
          target_commitish: ${{ github.sha }}
          name: MetaDrop ${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: dist/*
