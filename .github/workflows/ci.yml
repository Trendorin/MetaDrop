name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            appstream build-essential cmake desktop-file-utils ninja-build \
            qt6-base-dev qt6-svg-dev qt6-tools-dev \
            libarchive-dev libexiv2-dev libqpdf-dev libtag1-dev

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DMETADROP_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Validate desktop metadata
        run: |
          desktop-file-validate data/io.github.trendorin.MetaDrop.desktop
          appstreamcli validate --no-net data/io.github.trendorin.MetaDrop.metainfo.xml

  fedora-rpm:
    name: Fedora 44 RPM install test
    runs-on: ubuntu-24.04
    container: fedora:44
    timeout-minutes: 30

    steps:
      - name: Install Fedora build dependencies
        run: |
          dnf install --setopt=install_weak_deps=False -y \
            cmake gcc-c++ git-core ninja-build pkgconf-pkg-config rpm-build \
            qt6-qtbase-devel qt6-qtsvg-devel qt6-qttools-devel \
            exiv2-devel taglib-devel qpdf-devel libarchive-devel

      - name: Check out source
        uses: actions/checkout@v7

      - name: Configure, build and test
        run: |
          cmake -S . -B build-fedora -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DMETADROP_BUILD_TESTS=ON
          cmake --build build-fedora --parallel 2
          ctest --test-dir build-fedora --output-on-failure

      - name: Build and install RPM
        run: |
          mkdir -p package-output
          cpack --config build-fedora/CPackConfig.cmake -G RPM -B package-output
          rpm_file="$(find package-output -maxdepth 1 -type f -name '*.rpm' -print -quit)"
          test -n "${rpm_file}"
          rpm -qpR "${rpm_file}" | grep -q 'libexiv2\.so\.28'
          rpm -qpR "${rpm_file}" | grep -q 'libqpdf\.so\.30'
          dnf install --setopt=install_weak_deps=False -y "${rpm_file}"
          rpm -q metadrop
          ldd /usr/bin/metadrop | tee /tmp/metadrop-ldd.txt
          ! grep -q 'not found' /tmp/metadrop-ldd.txt

  sanitizers:
    name: ASan and UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-svg-dev qt6-tools-dev \
            libarchive-dev libexiv2-dev libqpdf-dev libtag1-dev

      - name: Configure
        run: >-
          cmake -S . -B build-asan -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DMETADROP_BUILD_TESTS=ON
          -DMETADROP_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-asan --parallel 2

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build-asan --output-on-failure
