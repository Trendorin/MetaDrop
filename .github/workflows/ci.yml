name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            appstream build-essential cmake desktop-file-utils ninja-build \
            qt6-base-dev qt6-svg-dev qt6-tools-dev \
            libarchive-dev libexiv2-dev libqpdf-dev libtag1-dev

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DMETADROP_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Validate desktop metadata
        run: |
          desktop-file-validate packaging/io.github.trendorin.MetaDrop.desktop
          appstreamcli validate --no-net packaging/io.github.trendorin.MetaDrop.metainfo.xml

  sanitizers:
    name: ASan and UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-svg-dev qt6-tools-dev \
            libarchive-dev libexiv2-dev libqpdf-dev libtag1-dev

      - name: Configure
        run: >-
          cmake -S . -B build-asan -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DMETADROP_BUILD_TESTS=ON
          -DMETADROP_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-asan --parallel 2

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build-asan --output-on-failure
